name: Build GhostLock Exploit

on:
  push:
    branches: [main, master]
    paths:
      - '**.c'
      - '**.h'
      - 'Makefile'
      - '.github/workflows/*.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build for aarch64 (Android 13+)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          ndk-version: '27'
          sdk-version: 'platforms;android-33'

      - name: Find NDK tools
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la "$ANDROID_HOME/ndk/"
          ls -la "$ANDROID_HOME/ndk/"*/toolchains/llvm/prebuilt/linux-x86_64/bin/ | grep clang

      - name: Build trigger
        run: |
          NDK_PATH=$(find "$ANDROID_HOME/ndk" -maxdepth 1 -type d | sort -V | tail -1)
          echo "Using NDK: $NDK_PATH"
          
          CC_BIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang"
          
          if [ ! -f "$CC_BIN" ]; then
            echo "Trying to find any aarch64 android clang..."
            CC_BIN=$(find "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/" -name "aarch64*clang" | head -1)
          fi
          
          echo "CC = $CC_BIN"
          ls -la "$CC_BIN"
          "$CC_BIN" --version | head -1
          
          make trigger CC="$CC_BIN"

      - name: Build exploit
        run: |
          NDK_PATH=$(find "$ANDROID_HOME/ndk" -maxdepth 1 -type d | sort -V | tail -1)
          CC_BIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang"
          
          if [ ! -f "$CC_BIN" ]; then
            CC_BIN=$(find "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/" -name "aarch64*clang" | head -1)
          fi
          
          make exploit CC="$CC_BIN"

      - name: List artifacts
        run: |
          ls -lh ghostlock_* 2>/dev/null || echo "No binaries found"
          file ghostlock_* 2>/dev/null || true

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ghostlock-binaries
          path: |
            ghostlock_trigger
            ghostlock_exploit
          if-no-files-found: warn
          retention-days: 30
